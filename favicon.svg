<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Dark background with rounded corners -->
  <rect width="64" height="64" rx="14" fill="#0d0f18"/>
  <rect width="64" height="64" rx="14" fill="url(#bg)" opacity=".18"/>
  <!-- Magnifying glass circle -->
  <circle cx="27" cy="25" r="11" fill="none" stroke="url(#gl)" stroke-width="3.5"/>
  <!-- Handle -->
  <line x1="35" y1="33" x2="50" y2="48" stroke="url(#gl)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- AI dot in center -->
  <circle cx="27" cy="25" r="4" fill="url(#gl)" opacity=".9"/>
</svg>
